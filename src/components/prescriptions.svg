<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 750" width="100%" height="100%">
  <defs>
    <filter id="layerShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="8" dy="12" stdDeviation="14" flood-color="#022c22" flood-opacity="0.08" />
    </filter>

    <filter id="widgetShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.05" />
    </filter>

    <pattern id="qrNoise" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="4" height="4" fill="#0f172a"/>
      <rect x="4" y="4" width="4" height="4" fill="#0f172a"/>
      <rect x="0" y="4" width="2" height="2" fill="#0f172a"/>
      <rect x="6" y="0" width="2" height="2" fill="#0f172a"/>
    </pattern>

    <g id="ui-skeleton">
      <rect x="0" y="0" width="220" height="650" rx="16" fill="#ffffff" stroke="#f1f5f9" stroke-width="2"/>
      <rect x="250" y="80" width="380" height="540" rx="12" fill="#ffffff" stroke="#f1f5f9" stroke-width="2"/>
      <rect x="660" y="80" width="360" height="260" rx="8" fill="#ffffff" stroke="#f1f5f9" stroke-width="2"/>
      <rect x="660" y="370" width="360" height="250" rx="8" fill="#ffffff" stroke="#f1f5f9" stroke-width="2"/>
    </g>
  </defs>

  <rect width="100%" height="100%" fill="#ecfdf5" />

  <g transform="translate(30, 30)">
    <rect width="1040" height="650" rx="20" fill="#ffffff" filter="url(#layerShadow)" />
