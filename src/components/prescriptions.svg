        <rect x="30" y="110" width="6" height="6" rx="1" fill="none" stroke="#94a3b8" stroke-width="2"/><rect x="40" y="110" width="6" height="6" rx="1" fill="none" stroke="#94a3b8" stroke-width="2"/><rect x="30" y="120" width="6" height="6" rx="1" fill="none" stroke="#94a3b8" stroke-width="2"/><rect x="40" y="120" width="6" height="6" rx="1" fill="none" stroke="#94a3b8" stroke-width="2"/>
